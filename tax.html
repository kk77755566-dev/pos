<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS v1.3.2 TAXSA20</title>

<style>
body{
    font-family:sans-serif;
    background:#f3f3f3;
    padding:15px;
}

.container{
    max-width:700px;
    margin:auto;
}

h1{
    text-align:center;
}

.card{
    background:#fff;
    padding:15px;
    margin-bottom:15px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

input{
    width:100%;
    height:45px;
    font-size:18px;
    text-align:right;
    margin:5px 0;
}

.counter{
    display:flex;
    justify-content:center;
    gap:10px;
    align-items:center;
}

.counter button{
    width:55px;
    height:55px;
    font-size:28px;
    border:none;
    background:#2196f3;
    color:#fff;
    border-radius:10px;
}

.counter span{
    font-size:22px;
    width:40px;
    text-align:center;
}

.action{
    display:flex;
    gap:10px;
}

.calcBtn{
    flex:1;
    height:60px;
    background:#2e7d32;
    color:#fff;
    border:none;
    border-radius:12px;
    font-size:20px;
}

.resetBtn{
    flex:1;
    height:60px;
    background:#d32f2f;
    color:#fff;
    border:none;
    border-radius:12px;
    font-size:20px;
}

.result{
    background:#fff;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

.resultRow{
    display:flex;
    justify-content:space-between;
    font-size:20px;
    margin:8px 0;
}

.taxNote{
    text-align:center;
    font-size:14px;
    opacity:0.6;
}
</style>
</head>

<body>

<div class="container">

<h1>POS v1.3.2 TAXSA20</h1>

<div class="taxNote">税サ＝合計20%固定（統一仕様）</div>

<!-- セット -->
<div class="card">
<h2>セット</h2>
<input id="setPrice" value="5000">

<div class="counter">
<button onclick="setCount=safeMinus(setCount);render()">−</button>
<span id="setCount">0</span>
<button onclick="setCount++;render()">＋</button>
</div>
</div>

<!-- 指名 -->
<div class="card">
<h2>指名</h2>
<input id="nomiPrice" value="2000">

<div class="counter">
<button onclick="nomiCount=safeMinus(nomiCount);render()">−</button>
<span id="nomiCount">0</span>
<button onclick="nomiCount++;render()">＋</button>
</div>
</div>

<!-- ドリンクS -->
<div class="card">
<h2>ドリンクS</h2>
<input id="drinkSPrice" value="1000">

<div class="counter">
<button onclick="drinkS=safeMinus(drinkS);render()">−</button>
<span id="drinkS">0</span>
<button onclick="drinkS++;render()">＋</button>
</div>
</div>

<!-- ドリンクM -->
<div class="card">
<h2>ドリンクM</h2>
<input id="drinkMPrice" value="2000">

<div class="counter">
<button onclick="drinkM=safeMinus(drinkM);render()">−</button>
<span id="drinkM">0</span>
<button onclick="drinkM++;render()">＋</button>
</div>
</div>

<!-- ドリンクL -->
<div class="card">
<h2>ドリンクL</h2>
<input id="drinkLPrice" value="3000">

<div class="counter">
<button onclick="drinkL=safeMinus(drinkL);render()">−</button>
<span id="drinkL">0</span>
<button onclick="drinkL++;render()">＋</button>
</div>
</div>

<!-- 延長 -->
<div class="card">
<h2>30分延長</h2>
<input id="ext30Price" value="3000">

<div class="counter">
<button onclick="ext30Count=safeMinus(ext30Count);render()">−</button>
<span id="ext30Count">0</span>
<button onclick="ext30Count++;render()">＋</button>
</div>
</div>

<div class="card">
<h2>60分延長</h2>
<input id="ext60Price" value="5000">

<div class="counter">
<button onclick="ext60Count=safeMinus(ext60Count);render()">−</button>
<span id="ext60Count">0</span>
<button onclick="ext60Count++;render()">＋</button>
</div>
</div>

<!-- 操作 -->
<div class="action">
<button class="calcBtn" onclick="calc()">計算</button>
<button class="resetBtn" onclick="resetAll()">リセット</button>
</div>

<!-- 結果 -->
<div class="result">
<div class="resultRow"><span>小計</span><span id="subtotal">0</span></div>
<div class="resultRow"><span>税サ(20%)</span><span id="taxsa">0</span></div>
<div class="resultRow"><span>合計</span><span id="total">0</span></div>
</div>

<!-- 延長シミュレーション -->
<div class="result">
<div class="resultRow"><span>現在</span><span id="currentTotal">￥0ー</span></div>
<div class="resultRow"><span>30分延長</span><span id="next30">￥0ー</span></div>
<div class="resultRow"><span>60分延長</span><span id="next60">￥0ー</span></div>
</div>

</div>

<script>

let setCount=0, nomiCount=0;
let drinkS=0, drinkM=0, drinkL=0;
let ext30Count=0, ext60Count=0;

const el=id=>document.getElementById(id);

function safeMinus(v){ return v>0 ? v-1 : 0; }

function render(){
el("setCount").innerText=setCount;
el("nomiCount").innerText=nomiCount;
el("drinkS").innerText=drinkS;
el("drinkM").innerText=drinkM;
el("drinkL").innerText=drinkL;
el("ext30Count").innerText=ext30Count;
el("ext60Count").innerText=ext60Count;
}

function calc(){

let set = +el("setPrice").value * setCount;
let nomi = +el("nomiPrice").value * nomiCount;

let dS = +el("drinkSPrice").value * drinkS;
let dM = +el("drinkMPrice").value * drinkM;
let dL = +el("drinkLPrice").value * drinkL;

let e30 = +el("ext30Price").value * ext30Count;
let e60 = +el("ext60Price").value * ext60Count;

// 小計
let sub = set + nomi + dS + dM + dL + e30 + e60;

// 税サ20%固定
let taxsa = Math.round(sub * 0.2);

// 合計
let total = sub + taxsa;

el("subtotal").innerText = Math.round(sub);
el("taxsa").innerText = taxsa;
el("total").innerText = total;

// 延長シミュレーション（税サ込み）
const ext30Base = (setCount*3000) + (nomiCount*2000);
const ext60Base = (setCount*5000) + (nomiCount*2000);

el("currentTotal").innerText = "￥" + total.toLocaleString() + "ー";
el("next30").innerText = "￥" + (total + ext30Base*1.2).toLocaleString() + "ー";
el("next60").innerText = "￥" + (total + ext60Base*1.2).toLocaleString() + "ー";
}

function resetAll(){

setCount=nomiCount=drinkS=drinkM=drinkL=0;
ext30Count=ext60Count=0;

el("setPrice").value=5000;
el("nomiPrice").value=2000;
el("drinkSPrice").value=1000;
el("drinkMPrice").value=2000;
el("drinkLPrice").value=3000;
el("ext30Price").value=3000;
el("ext60Price").value=5000;

render();
calc();
}

render();
</script>

</body>
</html>
