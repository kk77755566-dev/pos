<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS v1.3 Canvas FIX</title>

<style>
body{
    font-family:sans-serif;
    background:#f3f3f3;
    padding:15px;
}

.container{
    max-width:700px;
    margin:auto;
}

h1{
    text-align:center;
}

.card{
    background:#fff;
    padding:15px;
    margin-bottom:15px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

input{
    width:100%;
    height:45px;
    font-size:18px;
    text-align:right;
    margin:5px 0;
}

.counter{
    display:flex;
    justify-content:center;
    gap:10px;
    align-items:center;
}

.counter button{
    width:55px;
    height:55px;
    font-size:28px;
    border:none;
    background:#2196f3;
    color:#fff;
    border-radius:10px;
}

.counter span{
    font-size:22px;
    width:40px;
    text-align:center;
}

.taxArea{
    display:flex;
    gap:10px;
}

.taxBtn{
    flex:1;
    height:45px;
    border:none;
    border-radius:10px;
    background:#ddd;
    font-weight:bold;
}

.taxBtn.active{
    background:#000;
    color:#fff;
}

.action{
    display:flex;
    gap:10px;
}

.calcBtn{
    flex:1;
    height:60px;
    background:#2e7d32;
    color:#fff;
    border:none;
    border-radius:12px;
    font-size:20px;
}

.resetBtn{
    flex:1;
    height:60px;
    background:#d32f2f;
    color:#fff;
    border:none;
    border-radius:12px;
    font-size:20px;
}

.result{
    background:#fff;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

.resultRow{
    display:flex;
    justify-content:space-between;
    font-size:20px;
    margin:8px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>POS v1.3 Canvas FIX</h1>

<!-- セット -->
<div class="card">
<h2>セット</h2>
<input id="setPrice" value="5000">

<div class="counter">
<button onclick="setCount=safeMinus(setCount);render()">−</button>
<span id="setCount">0</span>
<button onclick="setCount++;render()">＋</button>
</div>

<div class="taxArea">
<button id="setEx" class="taxBtn active" onclick="setTax('set',true)">税抜</button>
<button id="setIn" class="taxBtn" onclick="setTax('set',false)">税込</button>
</div>
</div>

<!-- 指名 -->
<div class="card">
<h2>指名</h2>
<input id="nomiPrice" value="2000">

<div class="counter">
<button onclick="nomiCount=safeMinus(nomiCount);render()">−</button>
<span id="nomiCount">0</span>
<button onclick="nomiCount++;render()">＋</button>
</div>

<div class="taxArea">
<button id="nomiEx" class="taxBtn active" onclick="setTax('nomi',true)">税抜</button>
<button id="nomiIn" class="taxBtn" onclick="setTax('nomi',false)">税込</button>
</div>
</div>

<!-- ドリンクS -->
<div class="card">
<h2>ドリンクS</h2>
<input id="drinkSPrice" value="1000">

<div class="counter">
<button onclick="drinkS=safeMinus(drinkS);render()">−</button>
<span id="drinkS">0</span>
<button onclick="drinkS++;render()">＋</button>
</div>

<div class="taxArea">
<button id="drinkSEx" class="taxBtn active" onclick="setTax('drinkS',true)">税抜</button>
<button id="drinkSIn" class="taxBtn" onclick="setTax('drinkS',false)">税込</button>
</div>
</div>

<!-- ドリンクM -->
<div class="card">
<h2>ドリンクM</h2>
<input id="drinkMPrice" value="2000">

<div class="counter">
<button onclick="drinkM=safeMinus(drinkM);render()">−</button>
<span id="drinkM">0</span>
<button onclick="drinkM++;render()">＋</button>
</div>

<div class="taxArea">
<button id="drinkMEx" class="taxBtn active" onclick="setTax('drinkM',true)">税抜</button>
<button id="drinkMIn" class="taxBtn" onclick="setTax('drinkM',false)">税込</button>
</div>
</div>

<!-- ドリンクL -->
<div class="card">
<h2>ドリンクL</h2>
<input id="drinkLPrice" value="3000">

<div class="counter">
<button onclick="drinkL=safeMinus(drinkL);render()">−</button>
<span id="drinkL">0</span>
<button onclick="drinkL++;render()">＋</button>
</div>

<div class="taxArea">
<button id="drinkLEx" class="taxBtn active" onclick="setTax('drinkL',true)">税抜</button>
<button id="drinkLIn" class="taxBtn" onclick="setTax('drinkL',false)">税込</button>
</div>
</div>

<!-- 30分延長 -->
<div class="card">
<h2>30分延長</h2>
<input id="ext30Price" value="3000">

<div class="counter">
<button onclick="ext30Count=safeMinus(ext30Count);render()">−</button>
<span id="ext30Count">0</span>
<button onclick="ext30Count++;render()">＋</button>
</div>

<div class="taxArea">
<button id="ext30Ex" class="taxBtn active" onclick="setTax('ext30',true)">税抜</button>
<button id="ext30In" class="taxBtn" onclick="setTax('ext30',false)">税込</button>
</div>
</div>

<!-- 60分延長 -->
<div class="card">
<h2>60分延長</h2>
<input id="ext60Price" value="5000">

<div class="counter">
<button onclick="ext60Count=safeMinus(ext60Count);render()">−</button>
<span id="ext60Count">0</span>
<button onclick="ext60Count++;render()">＋</button>
</div>

<div class="taxArea">
<button id="ext60Ex" class="taxBtn active" onclick="setTax('ext60',true)">税抜</button>
<button id="ext60In" class="taxBtn" onclick="setTax('ext60',false)">税込</button>
</div>
</div>

<!-- 操作 -->
<div class="action">
<button class="calcBtn" onclick="calc()">計算</button>
<button class="resetBtn" onclick="resetAll()">リセット</button>
</div>

<!-- 結果 -->
<div class="result">
<div class="resultRow"><span>小計</span><span id="subtotal">0</span></div>
<div class="resultRow"><span>税</span><span id="tax">0</span></div>
<div class="resultRow"><span>合計</span><span id="total">0</span></div>
</div>

<!-- 延長 -->
<div class="result">
<div class="resultRow"><span>現在</span><span id="currentTotal">￥0ー</span></div>
<div class="resultRow"><span>30分延長</span><span id="next30">￥0ー</span></div>
<div class="resultRow"><span>60分延長</span><span id="next60">￥0ー</span></div>
</div>

</div>

<script>

let setCount=0, nomiCount=0;
let drinkS=0, drinkM=0, drinkL=0;
let ext30Count=0, ext60Count=0;

let taxMode={
set:true,
nomi:true,
drinkS:true,
drinkM:true,
drinkL:true,
ext30:true,
ext60:true
};

const el=id=>document.getElementById(id);

function safeMinus(v){ return v>0 ? v-1 : 0; }

function render(){
el("setCount").innerText=setCount;
el("nomiCount").innerText=nomiCount;
el("drinkS").innerText=drinkS;
el("drinkM").innerText=drinkM;
el("drinkL").innerText=drinkL;
el("ext30Count").innerText=ext30Count;
el("ext60Count").innerText=ext60Count;
}

function setTax(type,mode){
taxMode[type]=mode;
el(type+"Ex").classList.remove("active");
el(type+"In").classList.remove("active");
el(type+(mode?"Ex":"In")).classList.add("active");
}

function calcItem(price,count){
let sub=price*count;
return sub;
}

function yen(v){
return "￥"+Math.round(v).toLocaleString()+"ー";
}

function calc(){

// 税抜・税込すべてそのまま合計（1.2なし）
let setR=calcItem(+el("setPrice").value,setCount);
let nomiR=calcItem(+el("nomiPrice").value,nomiCount);

let dS=calcItem(+el("drinkSPrice").value,drinkS);
let dM=calcItem(+el("drinkMPrice").value,drinkM);
let dL=calcItem(+el("drinkLPrice").value,drinkL);

let e30=calcItem(+el("ext30Price").value,ext30Count);
let e60=calcItem(+el("ext60Price").value,ext60Count);

let sub=setR+nomiR+dS+dM+dL+e30+e60;

// ★仕様通り：税＝税抜+税込（=全体合計）
let tax=sub;

// 合計
let total=sub+tax;

el("subtotal").innerText=Math.round(sub);
el("tax").innerText=Math.round(tax);
el("total").innerText=Math.round(total);

const current=total;

const ext30Base=(setCount*3000)+(nomiCount*2000);
const ext60Base=(setCount*5000)+(nomiCount*2000);

el("currentTotal").innerText=yen(current);
el("next30").innerText=yen(current+(ext30Base*1.2));
el("next60").innerText=yen(current+(ext60Base*1.2));
}

function resetAll(){

setCount=nomiCount=drinkS=drinkM=drinkL=0;
ext30Count=ext60Count=0;

taxMode={set:true,nomi:true,drinkS:true,drinkM:true,drinkL:true,ext30:true,ext60:true};

render();

// ボタン状態リセット
["set","nomi","drinkS","drinkM","drinkL","ext30","ext60"].forEach(t=>{
el(t+"Ex").classList.add("active");
el(t+"In").classList.remove("active");
});

el("setPrice").value=5000;
el("nomiPrice").value=2000;
el("drinkSPrice").value=1000;
el("drinkMPrice").value=2000;
el("drinkLPrice").value=3000;
el("ext30Price").value=3000;
el("ext60Price").value=5000;

calc();
}

render();
</script>

</body>
</html>
