<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS v1.3.4 TAXSA FIX</title>

<style>
body{
    font-family:sans-serif;
    background:#f3f3f3;
    padding:15px;
}

.container{max-width:700px;margin:auto;}

h1{text-align:center;}

.card{
    background:#fff;
    padding:15px;
    margin-bottom:15px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

input{
    width:100%;
    height:45px;
    font-size:18px;
    text-align:right;
    margin:5px 0;
}

.counter{
    display:flex;
    justify-content:center;
    gap:10px;
    align-items:center;
}

.counter button{
    width:55px;height:55px;
    font-size:28px;
    border:none;
    background:#2196f3;
    color:#fff;
    border-radius:10px;
}

.counter span{
    font-size:22px;
    width:40px;
    text-align:center;
}

.taxArea{
    display:flex;
    gap:10px;
}

.taxBtn{
    flex:1;
    height:45px;
    border:none;
    border-radius:10px;
    background:#ddd;
    font-weight:bold;
}

.taxBtn.active{
    background:#000;
    color:#fff;
}

.action{
    display:flex;
    gap:10px;
}

.calcBtn{
    flex:1;
    height:60px;
    background:#2e7d32;
    color:#fff;
    border:none;
    border-radius:12px;
    font-size:20px;
}

.resetBtn{
    flex:1;
    height:60px;
    background:#d32f2f;
    color:#fff;
    border:none;
    border-radius:12px;
    font-size:20px;
}

.result{
    background:#fff;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

.resultRow{
    display:flex;
    justify-content:space-between;
    font-size:20px;
    margin:8px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>POS v1.3.4 TAXSA FIX</h1>

<!-- セット -->
<div class="card">
<h2>セット</h2>
<input id="setPrice" value="5000">
<div class="counter">
<button onclick="setCount=safeMinus(setCount);render()">−</button>
<span id="setCount">0</span>
<button onclick="setCount++;render()">＋</button>
</div>
<div class="taxArea">
<button id="setEx" class="taxBtn active" onclick="setTax('set',true)">税抜</button>
<button id="setIn" class="taxBtn" onclick="setTax('set',false)">税込</button>
</div>
</div>

<!-- 指名 -->
<div class="card">
<h2>指名</h2>
<input id="nomiPrice" value="2000">
<div class="counter">
<button onclick="nomiCount=safeMinus(nomiCount);render()">−</button>
<span id="nomiCount">0</span>
<button onclick="nomiCount++;render()">＋</button>
</div>
<div class="taxArea">
<button id="nomiEx" class="taxBtn active" onclick="setTax('nomi',true)">税抜</button>
<button id="nomiIn" class="taxBtn" onclick="setTax('nomi',false)">税込</button>
</div>
</div>

<!-- ドリンク -->
<div class="card">
<h2>ドリンク</h2>
<input id="drinkPrice" value="1000">
<div class="counter">
<button onclick="drink=safeMinus(drink);render()">−</button>
<span id="drink">0</span>
<button onclick="drink++;render()">＋</button>
</div>
<div class="taxArea">
<button id="drinkEx" class="taxBtn active" onclick="setTax('drink',true)">税抜</button>
<button id="drinkIn" class="taxBtn" onclick="setTax('drink',false)">税込</button>
</div>
</div>

<!-- 操作 -->
<div class="action">
<button class="calcBtn" onclick="calc()">計算</button>
<button class="resetBtn" onclick="resetAll()">リセット</button>
</div>

<!-- 結果 -->
<div class="result">
<div class="resultRow"><span>小計</span><span id="subtotal">0</span></div>
<div class="resultRow"><span>税サ</span><span id="taxsa">0</span></div>
<div class="resultRow"><span>合計</span><span id="total">0</span></div>
</div>

</div>

<script>

let setCount=0, nomiCount=0, drink=0;

const el=id=>document.getElementById(id);

function safeMinus(v){return v>0?v-1:0;}

function setTax(type,mode){
el(type+"Ex").classList.remove("active");
el(type+"In").classList.remove("active");
el(type+(mode?"Ex":"In")).classList.add("active");
el(type).dataset.tax = mode ? "1" : "0";
}

function calc(){

let set = +el("setPrice").value * setCount;
let nomi = +el("nomiPrice").value * nomiCount;
let dr = +el("drinkPrice").value * drink;

// 小計（税抜＋税込×1.2）
let sub =
(set * (el("set").dataset.tax=="1"?1.2:1)) +
(nomi * (el("nomi").dataset.tax=="1"?1.2:1)) +
(dr * (el("drink").dataset.tax=="1"?1.2:1));

// 税サ
let taxsa =
(set * (el("set").dataset.tax=="1"?0.2:1)) +
(nomi * (el("nomi").dataset.tax=="1"?0.2:1)) +
(dr * (el("drink").dataset.tax=="1"?0.2:1));

let total = sub + taxsa;

el("subtotal").innerText=Math.round(sub);
el("taxsa").innerText=Math.round(taxsa);
el("total").innerText=Math.round(total);
}

function resetAll(){

setCount=nomiCount=drink=0;

["set","nomi","drink"].forEach(k=>{
el(k).dataset.tax="1";
el(k+"Ex").classList.add("active");
el(k+"In").classList.remove("active");
});

render();
calc();
}

function render(){
el("setCount").innerText=setCount;
el("nomiCount").innerText=nomiCount;
el("drink").innerText=drink;
}

render();
</script>

</body>
</html>
