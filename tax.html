<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS v1.3 FIX</title>

<style>
body{
    font-family:sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:12px;
}

.container{
    max-width:720px;
    margin:auto;
}

h1{
    text-align:center;
    margin:10px 0 20px;
}

.card{
    background:#fff;
    padding:14px;
    margin-bottom:12px;
    border-radius:14px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

h2{
    margin:0 0 10px;
    font-size:18px;
}

input{
    width:100%;
    height:42px;
    font-size:16px;
    text-align:right;
    margin-bottom:10px;
    border:1px solid #ddd;
    border-radius:8px;
    padding:0 10px;
}

.counter{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:8px 0;
}

.counter button{
    width:48px;
    height:48px;
    border:none;
    border-radius:10px;
    background:#1976d2;
    color:#fff;
    font-size:22px;
}

.counter span{
    font-size:20px;
    width:40px;
    text-align:center;
}

.taxArea{
    display:flex;
    gap:8px;
}

.taxBtn{
    flex:1;
    height:42px;
    border:none;
    border-radius:10px;
    background:#ddd;
}

.taxBtn.active{
    background:#000;
    color:#fff;
}

.action{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.calcBtn{
    flex:2;
    height:55px;
    background:#2e7d32;
    color:#fff;
    border:none;
    border-radius:12px;
}

.resetBtn{
    flex:1;
    height:55px;
    background:#d32f2f;
    color:#fff;
    border:none;
    border-radius:12px;
}

.result{
    background:#fff;
    padding:14px;
    border-radius:14px;
    margin-top:12px;
}

.resultRow{
    display:flex;
    justify-content:space-between;
    font-size:18px;
    padding:6px 0;
}

.extBox{
    background:#fff;
    padding:14px;
    border-radius:14px;
    margin-top:12px;
    border:2px solid #111;
}
</style>
</head>

<body>

<div class="container">
<h1>POS v1.3 FIX</h1>

<!-- セット -->
<div class="card">
<h2>セット</h2>
<input id="setPrice" value="5000">

<div class="counter">
<button onclick="setCount=safeMinus(setCount);render()">−</button>
<span id="setCount">0</span>
<button onclick="setCount++;render()">＋</button>
</div>

<div class="taxArea">
<button id="setEx" class="taxBtn active" onclick="setTax('set',true)">税抜</button>
<button id="setIn" class="taxBtn" onclick="setTax('set',false)">税込</button>
</div>
</div>

<!-- 指名 -->
<div class="card">
<h2>指名</h2>
<input id="nomiPrice" value="2000">

<div class="counter">
<button onclick="nomiCount=safeMinus(nomiCount);render()">−</button>
<span id="nomiCount">0</span>
<button onclick="nomiCount++;render()">＋</button>
</div>

<div class="taxArea">
<button id="nomiEx" class="taxBtn active" onclick="setTax('nomi',true)">税抜</button>
<button id="nomiIn" class="taxBtn" onclick="setTax('nomi',false)">税込</button>
</div>
</div>

<!-- ドリンクS -->
<div class="card">
<h2>ドリンクS</h2>
<input id="drinkSPrice" value="1000">

<div class="counter">
<button onclick="drinkS=safeMinus(drinkS);render()">−</button>
<span id="drinkS">0</span>
<button onclick="drinkS++;render()">＋</button>
</div>

<div class="taxArea">
<button id="drinkSEx" class="taxBtn active" onclick="setTax('drinkS',true)">税抜</button>
<button id="drinkSIn" class="taxBtn" onclick="setTax('drinkS',false)">税込</button>
</div>
</div>

<!-- ドリンクM -->
<div class="card">
<h2>ドリンクM</h2>
<input id="drinkMPrice" value="2000">

<div class="counter">
<button onclick="drinkM=safeMinus(drinkM);render()">−</button>
<span id="drinkM">0</span>
<button onclick="drinkM++;render()">＋</button>
</div>

<div class="taxArea">
<button id="drinkMEx" class="taxBtn active" onclick="setTax('drinkM',true)">税抜</button>
<button id="drinkMIn" class="taxBtn" onclick="setTax('drinkM',false)">税込</button>
</div>
</div>

<!-- ドリンクL -->
<div class="card">
<h2>ドリンクL</h2>
<input id="drinkLPrice" value="3000">

<div class="counter">
<button onclick="drinkL=safeMinus(drinkL);render()">−</button>
<span id="drinkL">0</span>
<button onclick="drinkL++;render()">＋</button>
</div>

<div class="taxArea">
<button id="drinkLEx" class="taxBtn active" onclick="setTax('drinkL',true)">税抜</button>
<button id="drinkLIn" class="taxBtn" onclick="setTax('drinkL',false)">税込</button>
</div>
</div>

<!-- 60分延長 -->
<div class="card">
<h2>60分延長</h2>
<input id="ext60Price" value="5000">

<div class="counter">
<button onclick="ext60Count=safeMinus(ext60Count);render()">−</button>
<span id="ext60Count">0</span>
<button onclick="ext60Count++;render()">＋</button>
</div>

<div class="taxArea">
<button id="ext60Ex" class="taxBtn active" onclick="setTax('ext60',true)">税抜</button>
<button id="ext60In" class="taxBtn" onclick="setTax('ext60',false)">税込</button>
</div>
</div>

<!-- 30分延長 -->
<div class="card">
<h2>30分延長</h2>
<input id="ext30Price" value="3000">

<div class="counter">
<button onclick="ext30Count=safeMinus(ext30Count);render()">−</button>
<span id="ext30Count">0</span>
<button onclick="ext30Count++;render()">＋</button>
</div>

<div class="taxArea">
<button id="ext30Ex" class="taxBtn active" onclick="setTax('ext30',true)">税抜</button>
<button id="ext30In" class="taxBtn" onclick="setTax('ext30',false)">税込</button>
</div>
</div>

<!-- 操作ボタン -->
<div class="action">
<button class="calcBtn" onclick="calc()">計算</button>
<button class="resetBtn" onclick="resetAll()">リセット</button>
</div>

<!-- 合計エリア -->
<div class="result">
<div class="resultRow"><span>小計</span><span id="subtotal">0</span></div>
<div class="resultRow"><span>税</span><span id="tax">0</span></div>
<div class="resultRow"><span>合計</span><span id="total">0</span></div>
</div>

<!-- 延長表示（別枠） -->
<div class="extBox">
<div class="resultRow"><span>現在</span><span id="currentTotal">￥0ー</span></div>
<div class="resultRow"><span>30分</span><span id="next30">￥0ー</span></div>
<div class="resultRow"><span>60分</span><span id="next60">￥0ー</span></div>
</div>

<script>

let setCount=0;
let nomiCount=0;

let drinkS=0;
let drinkM=0;
let drinkL=0;

let ext60Count=0;
let ext30Count=0;

/* 税モード */
let taxMode={
set:true,
nomi:true,
drinkS:true,
drinkM:true,
drinkL:true,
ext60:true,
ext30:true
};

/* DOMショートカット */
const el = (id)=>document.getElementById(id);

/* マイナス防止 */
function safeMinus(v){
return v>0 ? v-1 : 0;
}

/* 表示更新 */
function render(){
el("setCount").innerText=setCount;
el("nomiCount").innerText=nomiCount;

el("drinkS").innerText=drinkS;
el("drinkM").innerText=drinkM;
el("drinkL").innerText=drinkL;

el("ext60Count").innerText=ext60Count;
el("ext30Count").innerText=ext30Count;
}

/* 税切替 */
function setTax(type,mode){
taxMode[type]=mode;

el(type+"Ex").classList.remove("active");
el(type+"In").classList.remove("active");

el(type+(mode?"Ex":"In")).classList.add("active");
}

/* 基本計算 */
function calcLine(price,count,isEx){
let sub = price * count;
return isEx ? sub * 1.2 : sub;
}

</script>

<script>

/* =========================
   メイン計算
========================= */
function calc(){

    // セット・指名
    let setTotal = calcLine(+el("setPrice").value, setCount, taxMode.set);
    let nomiTotal = calcLine(+el("nomiPrice").value, nomiCount, taxMode.nomi);

    // ドリンク
    let drinkTotal =
        calcLine(+el("drinkSPrice").value, drinkS, taxMode.drinkS) +
        calcLine(+el("drinkMPrice").value, drinkM, taxMode.drinkM) +
        calcLine(+el("drinkLPrice").value, drinkL, taxMode.drinkL);

    // 延長（単体計算）
    let ext60 = calcLine(+el("ext60Price").value, ext60Count, taxMode.ext60);
    let ext30 = calcLine(+el("ext30Price").value, ext30Count, taxMode.ext30);

    // 合計
    let total = setTotal + nomiTotal + drinkTotal + ext60 + ext30;

    // 表示
    el("subtotal").innerText = Math.round(total);
    el("tax").innerText = Math.round(total * 0.1);
    el("total").innerText = Math.round(total);

    // 延長用ベース
    let base = total;

    // 延長加算（セット＋指名のみ）
    let addSetNom =
        (setCount * 5000) +
        (nomiCount * 2000);

    // 表示（現在）
    el("currentTotal").innerText =
        "￥" + Math.round(base).toLocaleString() + "ー";

    // 30分
    el("next30").innerText =
        "￥" + Math.round(base + addSetNom).toLocaleString() + "ー";

    // 60分
    el("next60").innerText =
        "￥" + Math.round(base + addSetNom).toLocaleString() + "ー";
}

</script>

<script>

/* =========================
   リセット
========================= */
function resetAll(){

    // カウント初期化
    setCount = 0;
    nomiCount = 0;

    drinkS = 0;
    drinkM = 0;
    drinkL = 0;

    ext60Count = 0;
    ext30Count = 0;

    // 表示更新
    render();

    // 入力値リセット
    el("setPrice").value = 5000;
    el("nomiPrice").value = 2000;
    el("drinkSPrice").value = 1000;
    el("drinkMPrice").value = 2000;
    el("drinkLPrice").value = 3000;
    el("ext60Price").value = 5000;
    el("ext30Price").value = 3000;

    // 税モード初期化（全部税込→税抜状態）
    taxMode = {
        set:true,
        nomi:true,
        drinkS:true,
        drinkM:true,
        drinkL:true,
        ext60:true,
        ext30:true
    };

    // 表示も0に戻す
    el("subtotal").innerText = 0;
    el("tax").innerText = 0;
    el("total").innerText = 0;

    el("currentTotal").innerText = "￥0ー";
    el("next30").innerText = "￥0ー";
    el("next60").innerText = "￥0ー";
}

</script>

<script>

/* =========================
   安全補助関数
========================= */

/* DOM取得 */
const el = (id)=>document.getElementById(id);

/* マイナス防止 */
function safeMinus(v){
    return v > 0 ? v - 1 : 0;
}

/* 税計算ロジック */
function calcLine(price, count, isEx){
    let sub = price * count;

    // 税抜ON → 1.2倍
    if(isEx){
        return sub * 1.2;
    }

    // 税込 → そのまま
    return sub;
}

/* =========================
   表示更新
========================= */
function render(){

    el("setCount").innerText = setCount;
    el("nomiCount").innerText = nomiCount;

    el("drinkS").innerText = drinkS;
    el("drinkM").innerText = drinkM;
    el("drinkL").innerText = drinkL;

    el("ext60Count").innerText = ext60Count;
    el("ext30Count").innerText = ext30Count;
}

/* =========================
   税ボタン切替
========================= */
function setTax(type, mode){

    taxMode[type] = mode;

    el(type + "Ex").classList.remove("active");
    el(type + "In").classList.remove("active");

    el(type + (mode ? "Ex" : "In")).classList.add("active");
}

</script>

</body>
</html>
