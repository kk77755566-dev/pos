<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS v1.3.1</title>

<style>
body{
    font-family: sans-serif;
    background:#111;
    color:#fff;
    margin:0;
    padding:20px;
}

h1{
    font-size:20px;
    margin-bottom:10px;
}

.box{
    background:#1e1e1e;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:8px 0;
}

button{
    padding:8px 12px;
    margin:2px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
}

.plus{background:#2ecc71;color:#fff;}
.minus{background:#e74c3c;color:#fff;}
.reset{background:#f39c12;color:#000;}

.value{
    font-size:18px;
    font-weight:bold;
}

.total{
    font-size:22px;
    color:#00ffcc;
    font-weight:bold;
}

.small{
    font-size:13px;
    opacity:0.8;
}
</style>
</head>

<body>

<h1>POS v1.3.1</h1>

<div class="box">

<div class="row">
<span>セット</span>
<div>
<button class="minus" onclick="chg('set',-1)">-</button>
<span id="set" class="value">0</span>
<button class="plus" onclick="chg('set',1)">+</button>
</div>
</div>

<div class="row">
<span>指名</span>
<div>
<button class="minus" onclick="chg('shimei',-1)">-</button>
<span id="shimei" class="value">0</span>
<button class="plus" onclick="chg('shimei',1)">+</button>
</div>
</div>

<div class="row">
<span>ドリンクS</span>
<div>
<button class="minus" onclick="chg('drinkS',-1)">-</button>
<span id="drinkS" class="value">0</span>
<button class="plus" onclick="chg('drinkS',1)">+</button>
</div>
</div>

<div class="row">
<span>ドリンクM</span>
<div>
<button class="minus" onclick="chg('drinkM',-1)">-</button>
<span id="drinkM" class="value">0</span>
<button class="plus" onclick="chg('drinkM',1)">+</button>
</div>
</div>

<div class="row">
<span>ドリンクL</span>
<div>
<button class="minus" onclick="chg('drinkL',-1)">-</button>
<span id="drinkL" class="value">0</span>
<button class="plus" onclick="chg('drinkL',1)">+</button>
</div>
</div>

</div>

<div class="box">
<div class="row">
<span>現在合計</span>
<span id="total" class="total">0円</span>
</div>

<div class="small">
税抜＝(指名+ドリンク)×1.2<br>
税込＝セット
</div>
</div>

<div class="box">

<div class="row">
<button onclick="setTax(false)" id="taxBtn1">税抜</button>
<button onclick="setTax(true)" id="taxBtn2">税込</button>
<button class="reset" onclick="resetAll()">リセット</button>
</div>

</div>

<div class="box">
<h3>延長シミュレーション</h3>

<div class="row">
<span>30分</span>
<span id="ext30">0円</span>
</div>

<div class="row">
<span>60分</span>
<span id="ext60">0円</span>
</div>

</div>

<script>

let data = {
set:0,
shimei:0,
drinkS:0,
drinkM:0,
drinkL:0,
tax:true
};

function chg(key,val){
data[key]+=val;
if(data[key]<0)data[key]=0;
update();
}

function setTax(flag){
data.tax=flag;
update();
}

function calc(){

let setPrice = data.set * 3000;

let drink =
(data.drinkS*1000) +
(data.drinkM*2000) +
(data.drinkL*3000);

let shimei = data.shimei * 2000;

let taxable = (drink + shimei) * 1.2;

let total = setPrice + taxable;

return {setPrice, taxable, total};
}

function extCalc(baseSet){

let setPrice = baseSet * 3000;

let drink =
(data.drinkS*1000) +
(data.drinkM*2000) +
(data.drinkL*3000);

let shimei = data.shimei * 2000;

let total = (setPrice + drink + shimei) * 1.2;

return total;
}

function update(){

let c = calc();

document.getElementById("set").innerText=data.set;
document.getElementById("shimei").innerText=data.shimei;
document.getElementById("drinkS").innerText=data.drinkS;
document.getElementById("drinkM").innerText=data.drinkM;
document.getElementById("drinkL").innerText=data.drinkL;

document.getElementById("total").innerText=
Math.floor(c.total)+"円";

document.getElementById("ext30").innerText=
Math.floor(extCalc(data.set+1))+"円";

document.getElementById("ext60").innerText=
Math.floor(extCalc(data.set+2))+"円";

document.getElementById("taxBtn1").style.opacity=data.tax?0.5:1;
document.getElementById("taxBtn2").style.opacity=data.tax?1:0.5;

}

function resetAll(){

data={
set:0,
shimei:0,
drinkS:0,
drinkM:0,
drinkL:0,
tax:true
};

update();
}

update();

</script>

</body>
</html>
