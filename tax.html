<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS v1.3</title>

<style>
body{
    font-family:sans-serif;
    background:#f3f3f3;
    padding:15px;
}

.container{
    max-width:700px;
    margin:auto;
}

h1{
    text-align:center;
}

.card{
    background:#fff;
    padding:15px;
    margin-bottom:15px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

input{
    width:100%;
    height:45px;
    font-size:18px;
    text-align:right;
    margin:5px 0;
}

.counter{
    display:flex;
    justify-content:center;
    gap:10px;
    align-items:center;
}

.counter button{
    width:55px;
    height:55px;
    font-size:28px;
    border:none;
    background:#2196f3;
    color:#fff;
    border-radius:10px;
}

.counter span{
    font-size:22px;
    width:40px;
    text-align:center;
}

.taxArea{
    display:flex;
    gap:10px;
}

.taxBtn{
    flex:1;
    height:45px;
    border:none;
    border-radius:10px;
    background:#ddd;
}

.taxBtn.active{
    background:#000;
    color:#fff;
}

.action{
    display:flex;
    gap:10px;
}

.calcBtn{
    flex:1;
    height:60px;
    background:#2e7d32;
    color:#fff;
    border:none;
    border-radius:12px;
    font-size:20px;
}

.resetBtn{
    flex:1;
    height:60px;
    background:#d32f2f;
    color:#fff;
    border:none;
    border-radius:12px;
    font-size:20px;
}

.result{
    background:#fff;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

.resultRow{
    display:flex;
    justify-content:space-between;
    font-size:20px;
    margin:8px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>POS v1.3</h1>

<!-- セット -->
<div class="card">
<h2>セット</h2>
<input id="setPrice" value="5000">

<div class="counter">
<button onclick="setCount=safeMinus(setCount);render()">−</button>
<span id="setCount">0</span>
<button onclick="setCount++;render()">＋</button>
</div>

<div class="taxArea">
<button id="setEx" class="taxBtn active" onclick="setTax('set',true)">税抜</button>
<button id="setIn" class="taxBtn" onclick="setTax('set',false)">税込</button>
</div>
</div>

<!-- 指名 -->
<div class="card">
<h2>指名</h2>
<input id="nomiPrice" value="2000">

<div class="counter">
<button onclick="nomiCount=safeMinus(nomiCount);render()">−</button>
<span id="nomiCount">0</span>
<button onclick="nomiCount++;render()">＋</button>
</div>

<div class="taxArea">
<button id="nomiEx" class="taxBtn active" onclick="setTax('nomi',true)">税抜</button>
<button id="nomiIn" class="taxBtn" onclick="setTax('nomi',false)">税込</button>
</div>
</div>

<!-- ドリンク S -->
<div class="card">
<h2>ドリンク S</h2>
<input id="drinkSPrice" value="1000">

<div class="counter">
<button onclick="drinkS=safeMinus(drinkS);render()">−</button>
<span id="drinkS">0</span>
<button onclick="drinkS++;render()">＋</button>
</div>

<div class="taxArea">
<button id="drinkSEx" class="taxBtn active" onclick="setTax('drinkS',true)">税抜</button>
<button id="drinkSIn" class="taxBtn" onclick="setTax('drinkS',false)">税込</button>
</div>
</div>

<!-- ドリンク M -->
<div class="card">
<h2>ドリンク M</h2>
<input id="drinkMPrice" value="2000">

<div class="counter">
<button onclick="drinkM=safeMinus(drinkM);render()">−</button>
<span id="drinkM">0</span>
<button onclick="drinkM++;render()">＋</button>
</div>

<div class="taxArea">
<button id="drinkMEx" class="taxBtn active" onclick="setTax('drinkM',true)">税抜</button>
<button id="drinkMIn" class="taxBtn" onclick="setTax('drinkM',false)">税込</button>
</div>
</div>

<!-- ドリンク L -->
<div class="card">
<h2>ドリンク L</h2>
<input id="drinkLPrice" value="3000">

<div class="counter">
<button onclick="drinkL=safeMinus(drinkL);render()">−</button>
<span id="drinkL">0</span>
<button onclick="drinkL++;render()">＋</button>
</div>

<div class="taxArea">
<button id="drinkLEx" class="taxBtn active" onclick="setTax('drinkL',true)">税抜</button>
<button id="drinkLIn" class="taxBtn" onclick="setTax('drinkL',false)">税込</button>
</div>
</div>

<!-- 60分延長 -->
<div class="card">
<h2>60分延長</h2>
<input id="ext60Price" value="5000">

<div class="counter">
<button onclick="ext60Count=safeMinus(ext60Count);render()">−</button>
<span id="ext60Count">0</span>
<button onclick="ext60Count++;render()">＋</button>
</div>

<div class="taxArea">
<button id="ext60Ex" class="taxBtn active" onclick="setTax('ext60',true)">税抜</button>
<button id="ext60In" class="taxBtn" onclick="setTax('ext60',false)">税込</button>
</div>
</div>

<!-- 60分延長 -->
<div class="card">
<h2>60分延長</h2>
<input id="ext60Price" value="5000">

<div class="counter">
<button onclick="ext60Count=safeMinus(ext60Count);render()">−</button>
<span id="ext60Count">0</span>
<button onclick="ext60Count++;render()">＋</button>
</div>

<div class="taxArea">
<button id="ext60Ex" class="taxBtn active" onclick="setTax('ext60',true)">税抜</button>
<button id="ext60In" class="taxBtn" onclick="setTax('ext60',false)">税込</button>
</div>
</div>

<!-- 30分延長 -->
<div class="card">
<h2>30分延長</h2>
<input id="ext30Price" value="3000">

<div class="counter">
<button onclick="ext30Count=safeMinus(ext30Count);render()">−</button>
<span id="ext30Count">0</span>
<button onclick="ext30Count++;render()">＋</button>
</div>

<div class="taxArea">
<button id="ext30Ex" class="taxBtn active" onclick="setTax('ext30',true)">税抜</button>
<button id="ext30In" class="taxBtn" onclick="setTax('ext30',false)">税込</button>
</div>
</div>

<!-- 操作ボタン -->
<div class="action">
<button class="calcBtn" onclick="calc()">計算</button>
<button class="resetBtn" onclick="resetAll()">リセット</button>
</div>

<!-- 合計エリア -->
<div class="result">
<div class="resultRow"><span>小計</span><span id="subtotal">0</span></div>
<div class="resultRow"><span>税</span><span id="tax">0</span></div>
<div class="resultRow"><span>合計</span><span id="total">0</span></div>
</div>

<!-- 延長表示（別枠） -->
<div class="result" style="margin-top:20px; border:2px solid #000;">
<div class="resultRow"><span>現在</span><span id="currentTotal">￥0ー</span></div>
<div class="resultRow"><span>30分</span><span id="next30">￥0ー</span></div>
<div class="resultRow"><span>60分</span><span id="next60">￥0ー</span></div>
</div>

<script>

let setCount=0;
let nomiCount=0;
let drinkS=0;
let drinkM=0;
let drinkL=0;

let ext60Count=0;
let ext30Count=0;

let taxMode={
 set:true,
 nomi:true,
 drinkS:true,
 drinkM:true,
 drinkL:true,
 ext60:true,
 ext30:true
};

function safeMinus(v){
    return v>0 ? v-1 : 0;
}

const el = (id)=>document.getElementById(id);

function render(){
    el("setCount").innerText=setCount;
    el("nomiCount").innerText=nomiCount;
    el("drinkS").innerText=drinkS;
    el("drinkM").innerText=drinkM;
    el("drinkL").innerText=drinkL;
    el("ext60Count").innerText=ext60Count;
    el("ext30Count").innerText=ext30Count;
}

function setTax(type,mode){
    taxMode[type]=mode;

    el(type+"Ex").classList.remove("active");
    el(type+"In").classList.remove("active");

    el(type+(mode?"Ex":"In")).classList.add("active");
}

function calcLine(price,count,isEx){
    if(isEx){
        return price * count * 1.2;
    }else{
        return price * count;
    }
}

</script>

<script>

function calc(){

    // セット・指名（税モード反映）
    let setTotal = calcLine(5000, setCount, taxMode.set);
    let nomiTotal = calcLine(2000, nomiCount, taxMode.nomi);

    // ドリンク
    let drinkS = calcLine(+el("drinkSPrice").value, drinkS, taxMode.drinkS);
    let drinkM = calcLine(+el("drinkMPrice").value, drinkM, taxMode.drinkM);
    let drinkL = calcLine(+el("drinkLPrice").value, drinkL, taxMode.drinkL);

    let drinkTotal = drinkS + drinkM + drinkL;

    // 延長
    let ext60 = calcLine(+el("ext60Price").value, ext60Count, taxMode.ext60);
    let ext30 = calcLine(+el("ext30Price").value, ext30Count, taxMode.ext30);

    // 合計
    let sub = setTotal + nomiTotal + drinkTotal + ext60 + ext30;

    el("subtotal").innerText = Math.round(sub);
    el("tax").innerText = Math.round(sub * 0.1);
    el("total").innerText = Math.round(sub);

    // 延長表示（指名＋セット反映）
    let baseTotal = sub;

    let addSetNom = 
        (setCount * 5000) + 
        (nomiCount * 2000);

    el("currentTotal").innerText = "￥" + Math.round(baseTotal).toLocaleString() + "ー";
    el("next30").innerText = "￥" + Math.round(baseTotal + addSetNom).toLocaleString() + "ー";
    el("next60").innerText = "￥" + Math.round(baseTotal + addSetNom).toLocaleString() + "ー";

}

</script>

<script>

function resetAll(){

    setCount=0;
    nomiCount=0;
    drinkS=0;
    drinkM=0;
    drinkL=0;
    ext60Count=0;
    ext30Count=0;

    render();

    el("setPrice").value=5000;
    el("nomiPrice").value=2000;
    el("drinkSPrice").value=1000;
    el("drinkMPrice").value=2000;
    el("drinkLPrice").value=3000;
    el("ext60Price").value=5000;
    el("ext30Price").value=3000;

    taxMode = {
        set:true,
        nomi:true,
        drinkS:true,
        drinkM:true,
        drinkL:true,
        ext60:true,
        ext30:true
    };

    calc();

    el("currentTotal").innerText = "￥0ー";
    el("next30").innerText = "￥0ー";
    el("next60").innerText = "￥0ー";
}

</script>

</body>
</html>
